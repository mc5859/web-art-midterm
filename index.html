<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    user-select: none;
  }

  /* overflow:hidden so only drag controls scrolling */
  #scroll-wrapper {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    cursor: grab;
  }
  #scroll-wrapper.dragging { cursor: grabbing; }

  /* #world IS the plane — white, height doubled to 200px */
  #world {
    position: relative;
    height: 200px;
    background: #fff;
    overflow: hidden;
    flex-shrink: 0;
    /* width and margin-left set by JS */
  }

  .symbol {
    position: absolute;
    top: 50%;
    width: 80px; height: 80px;
    pointer-events: none;
    z-index: 10;
  }
  #sym-l { transform: translateY(-50%); }
  #sym-r { transform: translateY(calc(-50% + 6px)); } /* 6px offset (doubled) */

  .text-section {
    position: absolute;
    font-family: 'VT323', monospace;
    font-size: 34px;
    color: #000;
    white-space: nowrap;
    pointer-events: none;
    line-height: 1;
  }

  .mark {
    position: absolute;
    font-family: 'VT323', monospace;
    font-size: 24px;
    color: #000;
    opacity: 0.2;
    pointer-events: none;
  }

  #goto-end {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #c00;
    color: #fff;
    border: none;
    padding: 5px 18px;
    font-family: monospace;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    z-index: 50;
    letter-spacing: 0.05em;
  }

  #white-screen {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
  }

  #begin-overlay {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 1.4s ease;
  }

  #begin-btn {
    width: 90px; height: 90px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.45);
    color: rgba(255,255,255,0.6);
    font-family: 'VT323', monospace;
    font-size: 21px;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: border-color 0.25s, color 0.25s;
  }
  #begin-btn:hover {
    border-color: rgba(255,255,255,0.85);
    color: rgba(255,255,255,0.9);
  }

  #clock {
    position: fixed;
    bottom: 14px; right: 18px;
    font-family: monospace;
    font-size: 13px;
    color: #fff;
    opacity: 0.4;
    letter-spacing: 0.05em;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="scroll-wrapper">
  <div id="world">
    <div class="symbol" id="sym-l"></div>
    <div class="symbol" id="sym-r"></div>
    <button id="goto-end">GO TO END</button>
  </div>
</div>

<div id="white-screen"></div>

<div id="begin-overlay">
  <button id="begin-btn">begin</button>
</div>

<div id="clock">00:00:00</div>

<!-- Simple looping audio — plays at full volume on begin -->
<audio id="audio" loop preload="auto">
  <source src="webartsong2.mp3" type="audio/mpeg">
</audio>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const FULL_W       = 24000;
const SYM_W        = 80;   // doubled
const PLANE_H      = 200;  // doubled
const SHRINK_DUR   = 300;
// Flat edge at x=40 of the 80px rendered SVG (x=20 in viewBox scaled ×2).
// Touch: currentWidth - 80 + 40 = 40 → currentWidth = 80 = SYM_W
const MAX_MARGIN   = (FULL_W - SYM_W) / 2;          // 11960
const DEPART_SPEED = (MAX_MARGIN / SHRINK_DUR) * 5;  // ~199 px/s

// ── SECTIONS — topPx is vertical position (top edge of text in 200px plane) ──
const SECTIONS = [
  { id:'L1',  worldX: 1400,  side:'left',  topPx: 30,
    lines:[
      'the wall begins here at the water',
      'this is the first day',
      'the body knows only that it is moving',
      'facing west',
      'i did not look back',
      'the sea was already gone',
      'something started that cannot be undone'
    ]
  },
  { id:'L1h', worldX: 4200,  side:'left',  topPx: 130,
    lines:[
      'somewhere between the first step and the last',
      'i stopped counting days',
      'the body carries what the mind tries to put down',
      'grief is just love with nowhere to go',
      'the stones remember every foot that crossed them',
      'i am not the first to walk here feeling this'
    ]
  },
  { id:'L2',  worldX: 7000,  side:'left',  topPx: 50,
    lines:[
      'this was supposed to be something else',
      'by the time we started it had already become an ending',
      'i wonder what your end looks like',
      'the distance behind is the same as the distance ahead',
      'still walking',
      'i keep moving toward what is already gone',
      'the plan changed but we kept the form',
      'a wedding that became a farewell without anyone deciding'
    ]
  },
  { id:'L2h', worldX: 9600,  side:'left',  topPx: 145,
    lines:[
      'i did not expect the silence to have a shape',
      'to fill the lungs like this',
      'i have been holding my breath for weeks',
      'something i cannot name is ending',
      'it has been ending for a long time',
      'i grieve the thing we never got to begin',
      'loss is not one moment',
      'it is the slow accumulation of days that prove it'
    ]
  },
  { id:'L3',  worldX: 11200, side:'left',  topPx: 70,
    lines:[
      'the end is legible now',
      'every step toward',
      'every step away',
      'this is how you end something large',
      'you make it last long enough to deserve what it was',
      'i am almost there',
      'i carry the beginning with me still',
      'it has not been wasted'
    ]
  },
  { id:'R3',  worldX: 12800, side:'right', topPx: 105,
    lines:[
      'almost',
      'the ground is hard here',
      'i have been walking toward this',
      'it will be enough',
      'there is nothing left to prepare',
      'i know the shape of this ending now'
    ]
  },
  { id:'R2h', worldX: 14400, side:'right', topPx: 38,
    lines:[
      'less and less to carry',
      'or the same weight felt differently',
      'almost light',
      'the wall is just stone now',
      'it was always just stone',
      'i wanted it to mean more than it could',
      'maybe that is what love does',
      'asks the world to hold what only we can hold'
    ]
  },
  { id:'R2',  worldX: 17000, side:'right', topPx: 125,
    lines:[
      'the same day again',
      'the wall crumbles here',
      'no one restored it',
      'i think of the other end',
      'what it was supposed to be',
      'still',
      'the wind carries nothing from that direction',
      'or maybe i have stopped listening'
    ]
  },
  { id:'R1h', worldX: 19800, side:'right', topPx: 60,
    lines:[
      'the wind is different here than it was',
      'the wall shows its age',
      'i do not know what i am walking toward',
      'only that i am walking',
      'every step is a small farewell',
      'the desert does not ask what you wanted',
      'it asks only that you keep moving'
    ]
  },
  { id:'R1',  worldX: 22600, side:'right', topPx: 150,
    lines:[
      'the wall ends here at the sand',
      'day one',
      'facing east',
      'the wind was cold',
      'i did not look back',
      'the desert was already present',
      'something started that cannot be undone'
    ]
  },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let started    = false;
let startTime  = null;
let elapsed    = 0;
let margin     = 0;
let phase      = 0;  // 0=shrink 1=hold 2=separate 3=done
let phaseT     = 0;
let lastT      = null;
let symOpacity = 1;

// ── DOM ───────────────────────────────────────────────────────────────────────
const world        = document.getElementById('world');
const wrapper      = document.getElementById('scroll-wrapper');
const symLEl       = document.getElementById('sym-l');
const symREl       = document.getElementById('sym-r');
const whiteScreen  = document.getElementById('white-screen');
const beginOverlay = document.getElementById('begin-overlay');
const beginBtn     = document.getElementById('begin-btn');
const gotoEndBtn   = document.getElementById('goto-end');
const clockEl      = document.getElementById('clock');
const audio        = document.getElementById('audio');

// ── SYMBOLS (SVG rendered at 80×80, viewBox 40×40 so it scales ×2) ───────────
function makeSVG(d) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width',   SYM_W);
  svg.setAttribute('height',  SYM_W);
  svg.setAttribute('viewBox', '0 0 40 40');
  const p = document.createElementNS(ns, 'path');
  p.setAttribute('d', d); p.setAttribute('fill', '#000');
  svg.appendChild(p); return svg;
}
symLEl.appendChild(makeSVG('M20,4 A16,16 0 0,0 20,36 Z'));  // C: flat right
symREl.appendChild(makeSVG('M20,4 A16,16 0 0,1 20,36 Z'));  // D: flat left

// ── TEXT ELEMENTS ─────────────────────────────────────────────────────────────
const sectionStates = SECTIONS.map(sec => {
  const el = document.createElement('div');
  el.className = 'text-section';
  el.style.top = sec.topPx + 'px';
  world.appendChild(el);
  return { sec, el, lineIdx: 0, twPhase: 'typing', twT: 0, displayText: '' };
});

// ── MARKS (seeded RNG, 200px tall plane) ──────────────────────────────────────
const GLYPHS  = ['.', '·', '—', '×', '∙'];
const markEls = [];
{
  let s = 42;
  const rng = () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0xffffffff; };
  for (let i = 0; i < 160; i++) {
    const wx = rng() * (FULL_W - 400) + 200;
    const yf = rng();
    const g  = GLYPHS[Math.floor(rng() * GLYPHS.length)];
    const el = document.createElement('span');
    el.className = 'mark';
    el.textContent = g;
    el.style.top = Math.floor(yf * PLANE_H) + 'px';
    el.dataset.wx = wx;
    world.appendChild(el);
    markEls.push(el);
  }
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function startAudio() {
  audio.volume = 1.0;
  audio.play().catch(e => console.warn('audio:', e));
}

// ── DRAG SCROLL ───────────────────────────────────────────────────────────────
let isDragging    = false;
let dragStartX    = 0;
let dragScrollAt  = 0;

wrapper.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging   = true;
  dragStartX   = e.clientX;
  dragScrollAt = wrapper.scrollLeft;
  wrapper.classList.add('dragging');
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  wrapper.scrollLeft = dragScrollAt - (e.clientX - dragStartX);
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  wrapper.classList.remove('dragging');
});

// Block trackpad/wheel scroll so drag is the only control
wrapper.addEventListener('wheel', e => e.preventDefault(), { passive: false });

// Touch drag (trackpad two-finger on mobile / tablet)
let touchX = 0, touchScroll = 0;
wrapper.addEventListener('touchstart', e => {
  touchX      = e.touches[0].clientX;
  touchScroll = wrapper.scrollLeft;
}, { passive: true });
wrapper.addEventListener('touchmove', e => {
  wrapper.scrollLeft = touchScroll - (e.touches[0].clientX - touchX);
}, { passive: true });

// ── BEGIN ─────────────────────────────────────────────────────────────────────
beginBtn.addEventListener('click', () => {
  if (started) return;
  started = true;
  startAudio();
  beginOverlay.style.opacity = '0';
  setTimeout(() => { beginOverlay.style.display = 'none'; }, 1500);
  wrapper.scrollLeft = (FULL_W - window.innerWidth) / 2;
});

// GO TO END (debug)
gotoEndBtn.addEventListener('click', () => {
  if (!started) {
    started = true;
    beginOverlay.style.display = 'none';
    startAudio();
  }
  margin = MAX_MARGIN;
  phase  = 1;
  phaseT = 0;
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp  = (a, b, t)   => a + (b - a) * t;

function textOpacity(worldX, side) {
  const dist = side === 'left'
    ? worldX - margin
    : (FULL_W - worldX) - margin;
  const raw = clamp(1 - Math.max(0, dist) / 4000, 0, 1);
  return lerp(0.05, 0.85, raw);
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock(sec) {
  const s = Math.floor(sec) % 60;
  const m = Math.floor(sec / 60) % 60;
  const h = Math.floor(sec / 3600);
  clockEl.textContent =
    String(h).padStart(2,'0') + ':' +
    String(m).padStart(2,'0') + ':' +
    String(s).padStart(2,'0');
}

// ── TYPEWRITER ────────────────────────────────────────────────────────────────
const TYPE_SPD  = 0.04;
const HOLD_DUR  = 8;
const FADE_DUR  = 6;
const PAUSE_DUR = 2;

function stepTypewriter(state, dt) {
  const lines = state.sec.lines;
  state.twT += dt;
  let fadeAlpha = 1;

  if (state.twPhase === 'typing') {
    const chars = Math.floor(state.twT / TYPE_SPD);
    state.displayText = lines[state.lineIdx].slice(0, chars);
    if (chars >= lines[state.lineIdx].length) {
      state.displayText = lines[state.lineIdx];
      state.twPhase = 'hold'; state.twT = 0;
    }
  } else if (state.twPhase === 'hold') {
    if (state.twT >= HOLD_DUR) { state.twPhase = 'fade'; state.twT = 0; }
  } else if (state.twPhase === 'fade') {
    fadeAlpha = clamp(1 - state.twT / FADE_DUR, 0, 1);
    if (state.twT >= FADE_DUR) {
      state.displayText = ''; state.twPhase = 'pause'; state.twT = 0;
    }
  } else if (state.twPhase === 'pause') {
    fadeAlpha = 0;
    if (state.twT >= PAUSE_DUR) {
      state.lineIdx = (state.lineIdx + 1) % lines.length;
      state.twPhase = 'typing'; state.twT = 0;
    }
  }
  return fadeAlpha;
}

// ── FRAME LOOP ────────────────────────────────────────────────────────────────
function frame(ts) {
  requestAnimationFrame(frame);
  if (!started) return;

  if (!lastT) { lastT = ts; startTime = ts; }
  const dt = Math.min((ts - lastT) / 1000, 0.1);
  lastT = ts;
  elapsed = (ts - startTime) / 1000;
  updateClock(elapsed);

  // ── Phase 0: Shrink ──────────────────────────────────────────────────────
  if (phase === 0) {
    margin = clamp((elapsed / SHRINK_DUR) * MAX_MARGIN, 0, MAX_MARGIN);
    if (margin >= MAX_MARGIN) { phase = 1; phaseT = 0; }
  }

  // ── Phase 1: Hold (5s) ───────────────────────────────────────────────────
  else if (phase === 1) {
    margin = MAX_MARGIN;
    phaseT += dt;
    if (phaseT >= 5.0) { phase = 2; phaseT = 0; }
  }

  // ── Phase 2: Separation ──────────────────────────────────────────────────
  else if (phase === 2) {
    phaseT += dt;
    margin = Math.max(0, margin - DEPART_SPEED * dt);
    whiteScreen.style.opacity = clamp(phaseT / 15.0, 0, 1);
    if (phaseT > 15.0) {
      symOpacity = clamp(1 - (phaseT - 15.0) / 10.0, 0, 1);
      // fade audio
      audio.volume = clamp(audio.volume - dt * 0.05, 0, 1);
    }
    if (phaseT > 26.0) phase = 3;
  }

  // ── Compute current plane width ──────────────────────────────────────────
  const currentW = Math.max(SYM_W, FULL_W - 2 * margin);
  world.style.width = currentW + 'px';

  // Center plane in viewport when it's narrower than the viewport
  const vw = window.innerWidth;
  world.style.marginLeft = currentW < vw ? ((vw - currentW) / 2) + 'px' : '0px';

  // ── Symbol positions ─────────────────────────────────────────────────────
  symLEl.style.left    = '0px';
  symREl.style.left    = (currentW - SYM_W) + 'px';
  symLEl.style.opacity = symOpacity;
  symREl.style.opacity = symOpacity;

  // ── Text ─────────────────────────────────────────────────────────────────
  const showText = phase < 2;
  sectionStates.forEach(state => {
    const { sec, el } = state;
    const rx = sec.worldX - margin;

    if (!showText || rx < 0 || rx > currentW) {
      el.style.opacity = 0;
      el.textContent = '';
      return;
    }

    el.style.left = rx + 'px';
    const baseOp    = textOpacity(sec.worldX, sec.side);
    const fadeAlpha = stepTypewriter(state, dt);
    el.textContent  = state.displayText;
    el.style.opacity = baseOp * fadeAlpha;
  });

  // ── Marks ────────────────────────────────────────────────────────────────
  markEls.forEach(el => {
    const wx = parseFloat(el.dataset.wx);
    const rx = wx - margin;
    if (!showText || rx < 0 || rx > currentW) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
      el.style.left = rx + 'px';
    }
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
world.style.width = FULL_W + 'px';
requestAnimationFrame(frame);
</script>
</body>
</html>
