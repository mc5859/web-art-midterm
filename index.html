<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    user-select: none;
  }

  #scroll-wrapper {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    cursor: grab;
  }
  #scroll-wrapper.dragging { cursor: grabbing; }

  #world {
    position: relative;
    height: 200px;
    background: #fff;
    flex-shrink: 0;
    overflow: hidden; /* changed to visible in phase 2 */
  }

  .symbol {
    position: absolute;
    top: 50%;
    width: 80px; height: 80px;
    pointer-events: none;
    z-index: 10;
  }
  #sym-l { transform: translateY(-50%); }
  #sym-r { transform: translateY(calc(-50% + 6px)); }

  .text-section {
    position: absolute;
    font-family: 'VT323', monospace;
    font-size: 34px;
    color: #000;
    white-space: nowrap;
    pointer-events: none;
    line-height: 1;
  }

  .mark {
    position: absolute;
    font-family: 'VT323', monospace;
    font-size: 24px;
    color: #000;
    opacity: 0.15;
    pointer-events: none;
  }

  #goto-end {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #c00;
    color: #fff;
    border: none;
    padding: 5px 18px;
    font-family: monospace;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    z-index: 50;
    letter-spacing: 0.05em;
  }

  #white-screen {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
  }

  #begin-overlay {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 1.4s ease;
  }

  #begin-btn {
    width: 90px; height: 90px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.45);
    color: rgba(255,255,255,0.6);
    font-family: 'VT323', monospace;
    font-size: 21px;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: border-color 0.25s, color 0.25s;
  }
  #begin-btn:hover {
    border-color: rgba(255,255,255,0.85);
    color: rgba(255,255,255,0.9);
  }

  #clock {
    position: fixed;
    bottom: 14px; right: 18px;
    font-family: monospace;
    font-size: 13px;
    color: #fff;
    opacity: 0.4;
    letter-spacing: 0.05em;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="scroll-wrapper">
  <div id="world">
    <div class="symbol" id="sym-l"></div>
    <div class="symbol" id="sym-r"></div>
    <button id="goto-end">GO TO END</button>
  </div>
</div>

<div id="white-screen"></div>

<div id="begin-overlay">
  <button id="begin-btn">begin</button>
</div>

<div id="clock">00:00:00</div>

<audio id="audio" loop src="webartsong2.mp3"></audio>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const FULL_W       = 24000;
const SYM_W        = 80;
const PLANE_H      = 200;
const EDGE_PAD     = 80;   // breathing room between symbol and plane edge
const SHRINK_DUR   = 300;
// At meeting: currentW = 2*EDGE_PAD + SYM_W = 240
const MAX_MARGIN   = (FULL_W - (2 * EDGE_PAD + SYM_W)) / 2;  // 11880
const DEPART_SPEED = (MAX_MARGIN / SHRINK_DUR) * 5;           // ~198 px/s

// ── SECTIONS — topPx: vertical position (top of text) within 200px plane ─────
const SECTIONS = [
  { id:'L1',  worldX: 1400,  side:'left',  topPx: 28,
    lines:[
      'where the wall meets the sea',
      'the body moving before it was asked',
      'what it meant to leave',
      'or whether leaving is the right word',
      'facing something',
      'the light in that direction'
    ]
  },
  { id:'L1h', worldX: 4200,  side:'left',  topPx: 135,
    lines:[
      'somewhere in the middle of it',
      'what if this was always going to be',
      'the stones have held others before this',
      'what the body carries that the mind refuses',
      'if distance could be a kind of answer',
      'or if the question changes along the way'
    ]
  },
  { id:'L2',  worldX: 7000,  side:'left',  topPx: 52,
    lines:[
      'what it was supposed to become',
      'the shape of something that changed before it started',
      'what your end looks like from here',
      'whether it matters that neither of us decided',
      'still moving in the direction of',
      'the same distance forward as behind',
      'the ceremony held the form even after'
    ]
  },
  { id:'L2h', worldX: 9600,  side:'left',  topPx: 148,
    lines:[
      'if grief has a shape',
      'what it fills when it enters',
      'the weeks of not saying',
      'something ending that never fully',
      'how long it has been ending',
      'what it would have been called if',
      'whether it counts as a loss if it was also a beginning'
    ]
  },
  { id:'L3',  worldX: 11200, side:'left',  topPx: 68,
    lines:[
      'legible now in the way an ending gets legible',
      'every step is both',
      'how you hold the end of something large',
      'whether it deserves this length',
      'it has asked to be made to last',
      'almost there',
      'carrying the beginning still'
    ]
  },
  { id:'R3',  worldX: 12800, side:'right', topPx: 108,
    lines:[
      'almost',
      'the ground here',
      'moving toward this for some time now',
      'what enough means in this context',
      'nothing left to prepare',
      'the ending before it happens'
    ]
  },
  { id:'R2h', worldX: 14400, side:'right', topPx: 38,
    lines:[
      'the weight of it or the absence',
      'what the wall is without what was put into it',
      'what love asks the world to hold',
      'whether stone was ever the right material',
      'almost through it',
      'or almost into it'
    ]
  },
  { id:'R2',  worldX: 17000, side:'right', topPx: 128,
    lines:[
      'the same day',
      'what no one restored',
      'where the other end is in this weather',
      'what it was going to be',
      'still',
      'nothing from that direction',
      'or nothing that reaches'
    ]
  },
  { id:'R1h', worldX: 19800, side:'right', topPx: 58,
    lines:[
      'the wind has changed since then',
      'the wall in all this weather',
      'what is being walked toward',
      'only the walking',
      'each step a kind of',
      'the desert does not ask'
    ]
  },
  { id:'R1',  worldX: 22600, side:'right', topPx: 152,
    lines:[
      'where the wall meets sand',
      'the body moving before it was asked',
      'what it meant to start',
      'or whether starting is the word',
      'facing something',
      'the cold'
    ]
  },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let started    = false;
let startTime  = null;
let elapsed    = 0;
let margin     = 0;
let phase      = 0;  // 0=shrink 1=hold 2=passthrough 3=done
let phaseT     = 0;
let lastT      = null;
let symOpacity = 1;

// Phase 2 pass-through: symbols move with fixed-position after breaking free
let sym2Active = false;
let symLScreenX = 0, symLScreenY = 0;
let symRScreenX = 0, symRScreenY = 0;

// ── DOM ───────────────────────────────────────────────────────────────────────
const world        = document.getElementById('world');
const wrapper      = document.getElementById('scroll-wrapper');
const symLEl       = document.getElementById('sym-l');
const symREl       = document.getElementById('sym-r');
const whiteScreen  = document.getElementById('white-screen');
const beginOverlay = document.getElementById('begin-overlay');
const beginBtn     = document.getElementById('begin-btn');
const gotoEndBtn   = document.getElementById('goto-end');
const clockEl      = document.getElementById('clock');
const audio        = document.getElementById('audio');

// ── SYMBOLS ───────────────────────────────────────────────────────────────────
function makeSVG(d) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', SYM_W); svg.setAttribute('height', SYM_W);
  svg.setAttribute('viewBox', '0 0 40 40');
  const p = document.createElementNS(ns, 'path');
  p.setAttribute('d', d); p.setAttribute('fill', '#000');
  svg.appendChild(p); return svg;
}
symLEl.appendChild(makeSVG('M20,4 A16,16 0 0,0 20,36 Z'));  // C: flat right
symREl.appendChild(makeSVG('M20,4 A16,16 0 0,1 20,36 Z'));  // D: flat left

// ── TEXT ELEMENTS ─────────────────────────────────────────────────────────────
const sectionStates = SECTIONS.map(sec => {
  const el = document.createElement('div');
  el.className = 'text-section';
  el.style.top = sec.topPx + 'px';
  world.appendChild(el);
  return { sec, el, lineIdx: 0, twPhase: 'typing', twT: 0, displayText: '' };
});

// ── MARKS — spaced out, fewer, capped opacity below text ─────────────────────
const GLYPHS  = ['.', '·', '—', '×', '∙'];
const markEls = [];
{
  let s = 137;
  const rng = () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0xffffffff; };
  const placed = [];
  const MIN_SPACING = 260;
  let attempts = 0;
  while (placed.length < 65 && attempts < 12000) {
    attempts++;
    const wx = rng() * (FULL_W - 600) + 300;
    if (placed.some(p => Math.abs(p - wx) < MIN_SPACING)) continue;
    placed.push(wx);
    const yf = rng();
    const g  = GLYPHS[Math.floor(rng() * GLYPHS.length)];
    const el = document.createElement('span');
    el.className = 'mark';
    el.textContent = g;
    el.style.top = Math.floor(yf * PLANE_H) + 'px';
    el.dataset.wx = wx;
    world.appendChild(el);
    markEls.push(el);
  }
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
// Called directly on begin click (user gesture) so browser allows playback
function startAudio() {
  audio.currentTime = 0;
  audio.volume = 1.0;
  const p = audio.play();
  if (p && p.catch) p.catch(() => {});
}

// ── DRAG SCROLL ───────────────────────────────────────────────────────────────
let isDragging   = false;
let dragStartX   = 0;
let dragScrollAt = 0;

wrapper.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging   = true;
  dragStartX   = e.clientX;
  dragScrollAt = wrapper.scrollLeft;
  wrapper.classList.add('dragging');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  wrapper.scrollLeft = dragScrollAt - (e.clientX - dragStartX);
});
document.addEventListener('mouseup', () => {
  isDragging = false;
  wrapper.classList.remove('dragging');
});
wrapper.addEventListener('wheel', e => e.preventDefault(), { passive: false });

let touchX = 0, touchScroll = 0;
wrapper.addEventListener('touchstart', e => {
  touchX      = e.touches[0].clientX;
  touchScroll = wrapper.scrollLeft;
}, { passive: true });
wrapper.addEventListener('touchmove', e => {
  wrapper.scrollLeft = touchScroll - (e.touches[0].clientX - touchX);
}, { passive: true });

// ── BEGIN ─────────────────────────────────────────────────────────────────────
beginBtn.addEventListener('click', () => {
  if (started) return;
  started = true;
  startAudio();
  beginOverlay.style.opacity = '0';
  setTimeout(() => { beginOverlay.style.display = 'none'; }, 1500);
  wrapper.scrollLeft = (FULL_W - window.innerWidth) / 2;
});

// GO TO END (debug)
gotoEndBtn.addEventListener('click', () => {
  if (!started) {
    started = true;
    beginOverlay.style.display = 'none';
    startAudio();
  }
  margin = MAX_MARGIN;
  phase  = 1;
  phaseT = 0;
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp  = (a, b, t)   => a + (b - a) * t;

function textOpacity(worldX, side) {
  const dist = side === 'left'
    ? worldX - margin
    : (FULL_W - worldX) - margin;
  const raw = clamp(1 - Math.max(0, dist) / 4000, 0, 1);
  return lerp(0.05, 0.85, raw);
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock(sec) {
  const s = Math.floor(sec) % 60;
  const m = Math.floor(sec / 60) % 60;
  const h = Math.floor(sec / 3600);
  clockEl.textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ── TYPEWRITER ────────────────────────────────────────────────────────────────
const TYPE_SPD  = 0.04;
const HOLD_DUR  = 8;
const FADE_DUR  = 6;
const PAUSE_DUR = 2;

function stepTypewriter(state, dt) {
  const lines = state.sec.lines;
  state.twT += dt;
  let fadeAlpha = 1;

  if (state.twPhase === 'typing') {
    const chars = Math.floor(state.twT / TYPE_SPD);
    state.displayText = lines[state.lineIdx].slice(0, chars);
    if (chars >= lines[state.lineIdx].length) {
      state.displayText = lines[state.lineIdx];
      state.twPhase = 'hold'; state.twT = 0;
    }
  } else if (state.twPhase === 'hold') {
    if (state.twT >= HOLD_DUR) { state.twPhase = 'fade'; state.twT = 0; }
  } else if (state.twPhase === 'fade') {
    fadeAlpha = clamp(1 - state.twT / FADE_DUR, 0, 1);
    if (state.twT >= FADE_DUR) {
      state.displayText = ''; state.twPhase = 'pause'; state.twT = 0;
    }
  } else if (state.twPhase === 'pause') {
    fadeAlpha = 0;
    if (state.twT >= PAUSE_DUR) {
      state.lineIdx = (state.lineIdx + 1) % lines.length;
      state.twPhase = 'typing'; state.twT = 0;
    }
  }
  return fadeAlpha;
}

// ── ENTER PASS-THROUGH (phase 1 → 2) ─────────────────────────────────────────
function enterPassthrough() {
  // Capture current screen positions, switch to position:fixed so symbols
  // can travel freely across the viewport independent of the world div
  const lRect = symLEl.getBoundingClientRect();
  const rRect = symREl.getBoundingClientRect();
  symLScreenX = lRect.left;
  symLScreenY = lRect.top;
  symRScreenX = rRect.left;
  symRScreenY = rRect.top;

  symLEl.style.position = 'fixed';
  symLEl.style.top  = symLScreenY + 'px';
  symLEl.style.left = symLScreenX + 'px';
  symLEl.style.transform = 'none';
  symLEl.style.zIndex = '60';

  symREl.style.position = 'fixed';
  symREl.style.top  = symRScreenY + 'px';
  symREl.style.left = symRScreenX + 'px';
  symREl.style.transform = 'none';
  symREl.style.zIndex = '60';

  sym2Active = true;
}

// ── FRAME LOOP ────────────────────────────────────────────────────────────────
function frame(ts) {
  requestAnimationFrame(frame);
  if (!started) return;

  if (!lastT) { lastT = ts; startTime = ts; }
  const dt = Math.min((ts - lastT) / 1000, 0.1);
  lastT = ts;
  elapsed = (ts - startTime) / 1000;
  updateClock(elapsed);

  // ── Phase 0: Shrink ──────────────────────────────────────────────────────
  if (phase === 0) {
    margin = clamp((elapsed / SHRINK_DUR) * MAX_MARGIN, 0, MAX_MARGIN);
    if (margin >= MAX_MARGIN) { phase = 1; phaseT = 0; }
  }

  // ── Phase 1: Hold (5s) ───────────────────────────────────────────────────
  else if (phase === 1) {
    margin = MAX_MARGIN;
    phaseT += dt;
    if (phaseT >= 5.0) {
      phase = 2; phaseT = 0;
      enterPassthrough();
    }
  }

  // ── Phase 2: Pass-through + white screen ─────────────────────────────────
  else if (phase === 2) {
    phaseT += dt;

    // Symbols continue past each other (left goes right, right goes left)
    symLScreenX += DEPART_SPEED * dt;
    symRScreenX -= DEPART_SPEED * dt;
    symLEl.style.left = symLScreenX + 'px';
    symREl.style.left = symRScreenX + 'px';

    // White screen fades in over 15s
    whiteScreen.style.opacity = clamp(phaseT / 15.0, 0, 1);

    // Symbols fade after white is full
    if (phaseT > 15.0) {
      symOpacity = clamp(1 - (phaseT - 15.0) / 10.0, 0, 1);
      symLEl.style.opacity = symOpacity;
      symREl.style.opacity = symOpacity;
      // fade audio
      audio.volume = Math.max(0, audio.volume - dt * 0.04);
    }

    if (phaseT > 26.0) phase = 3;
  }

  // ── Phase 3: Done ─────────────────────────────────────────────────────────
  // held state — no updates needed

  // ── Compute current plane width ───────────────────────────────────────────
  const currentW = Math.max(2 * EDGE_PAD + SYM_W, FULL_W - 2 * margin);
  world.style.width = currentW + 'px';

  // Center plane when narrower than viewport
  const vw = window.innerWidth;
  world.style.marginLeft = currentW < vw ? ((vw - currentW) / 2) + 'px' : '0px';

  // ── Symbol positions (phases 0 and 1 only — phase 2 uses fixed) ──────────
  if (!sym2Active) {
    symLEl.style.left    = EDGE_PAD + 'px';
    symREl.style.left    = (currentW - SYM_W - EDGE_PAD) + 'px';
    symLEl.style.opacity = 1;
    symREl.style.opacity = 1;
  }

  // ── Text ─────────────────────────────────────────────────────────────────
  const showText = phase < 2;
  sectionStates.forEach(state => {
    const { sec, el } = state;
    const rx = sec.worldX - margin;
    if (!showText || rx < 0 || rx > currentW) {
      el.style.opacity = 0; el.textContent = ''; return;
    }
    el.style.left = rx + 'px';
    const baseOp    = textOpacity(sec.worldX, sec.side);
    const fadeAlpha = stepTypewriter(state, dt);
    el.textContent  = state.displayText;
    el.style.opacity = baseOp * fadeAlpha;
  });

  // ── Marks ────────────────────────────────────────────────────────────────
  markEls.forEach(el => {
    const wx = parseFloat(el.dataset.wx);
    const rx = wx - margin;
    if (!showText || rx < 0 || rx > currentW) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
      el.style.left = rx + 'px';
    }
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
world.style.width = FULL_W + 'px';
requestAnimationFrame(frame);
</script>
</body>
</html>
