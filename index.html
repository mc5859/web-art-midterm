<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    user-select: none;
  }

  #scroll-wrapper {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    cursor: grab;
  }
  #scroll-wrapper.dragging { cursor: grabbing; }

  #world {
    position: relative;
    height: 200px;
    background: #fff;
    flex-shrink: 0;
    overflow: hidden;
  }

  .symbol {
    position: absolute;
    top: 50%;
    width: 80px; height: 80px;
    pointer-events: none;
    z-index: 10;
  }
  #sym-l { transform: translateY(-50%); }
  #sym-r { transform: translateY(calc(-50% + 6px)); }

  .text-section {
    position: absolute;
    font-family: 'VT323', monospace;
    font-size: 26px;
    color: #000;
    white-space: nowrap;
    pointer-events: none;
    line-height: 1;
  }

  .mark {
    position: absolute;
    font-family: 'VT323', monospace;
    font-size: 24px;
    color: #000;
    opacity: 0.15;
    pointer-events: none;
  }

  #goto-end {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #c00;
    color: #fff;
    border: none;
    padding: 5px 18px;
    font-family: monospace;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    z-index: 50;
    letter-spacing: 0.05em;
  }

  /* Expanding white box — grows from plane position to fill screen */
  #expand-box {
    position: fixed;
    background: #fff;
    pointer-events: none;
    z-index: 45;
    opacity: 0;
  }

  /* Final white fade overlay */
  #white-screen {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 55;
  }

  #begin-overlay {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 1.4s ease;
  }

  #begin-btn {
    width: 90px; height: 90px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.45);
    color: rgba(255,255,255,0.6);
    font-family: 'VT323', monospace;
    font-size: 21px;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: border-color 0.25s, color 0.25s;
  }
  #begin-btn:hover {
    border-color: rgba(255,255,255,0.85);
    color: rgba(255,255,255,0.9);
  }

  #clock {
    position: fixed;
    bottom: 14px; right: 18px;
    font-family: monospace;
    font-size: 13px;
    color: #fff;
    opacity: 0.4;
    letter-spacing: 0.05em;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="scroll-wrapper">
  <div id="world">
    <div class="symbol" id="sym-l"></div>
    <div class="symbol" id="sym-r"></div>
    <button id="goto-end">GO TO END</button>
  </div>
</div>

<div id="expand-box"></div>
<div id="white-screen"></div>

<div id="begin-overlay">
  <button id="begin-btn">begin</button>
</div>

<div id="clock">00:00:00</div>

<audio id="audio" loop src="webartsong2.mp3"></audio>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const FULL_W         = 24000;
const SYM_W          = 80;
const PLANE_H        = 200;
const EDGE_PAD       = 80;
const SHRINK_DUR     = 300;
const MAX_MARGIN     = (FULL_W - (2 * EDGE_PAD + SYM_W)) / 2;  // 11880
const APPROACH_SPEED = MAX_MARGIN / SHRINK_DUR;                 // ~39.6 px/s (avg)
const DEPART_SPEED   = APPROACH_SPEED;                          // same speed for departure
const HOLD_DUR_PHASE   = 12.5;  // 2.5× original 5s
const DRAG_SENSITIVITY = 0.45; // fraction of drag distance applied to scroll
const SCROLL_LERP      = 0.07; // lerp factor per frame — world drifts with inertia
const EXPAND_DUR     = 16.0;   // seconds for box to expand to fullscreen
const FADE_DELAY     = 2.5;    // seconds after box full before white fade starts
const FADE_DUR_END   = 4.0;    // white fade duration

// ── TEXT SECTIONS ─────────────────────────────────────────────────────────────
// Outer sections (close to symbols at start) = personal voice
// Inner sections (farther from symbols)      = general/poetic
const SECTIONS = [
  // ── Near left symbol — personal ──
  { id:'L1',  worldX: 1400,  side:'left',  topPx: 40,
    lines:[
      'i wonder what your end looks like from here',
      'whether you feel the same cold'
    ]
  },
  { id:'L1h', worldX: 4200,  side:'left',  topPx: 128,
    lines:[
      'i have been thinking of you without stopping',
      'if you are carrying what i left behind'
    ]
  },
  // ── Farther from symbols — general/poetic ──
  { id:'L2',  worldX: 7000,  side:'left',  topPx: 60,
    lines:[
      'a ceremony held its form even after',
      'what the body carries when the mind stops'
    ]
  },
  { id:'L2h', worldX: 9600,  side:'left',  topPx: 145,
    lines:[
      'the shape of a loss before it has a name',
      'something ending that never fully'
    ]
  },
  { id:'L3',  worldX: 11200, side:'left',  topPx: 72,
    lines:[
      'every step toward',
      'every step away'
    ]
  },
  { id:'R3',  worldX: 12800, side:'right', topPx: 110,
    lines:[
      'almost',
      'the ground changes here'
    ]
  },
  { id:'R2h', worldX: 14400, side:'right', topPx: 42,
    lines:[
      'what stone holds that water cannot',
      'what was always going to erode'
    ]
  },
  { id:'R2',  worldX: 17000, side:'right', topPx: 132,
    lines:[
      'the same day again',
      'nothing from that direction'
    ]
  },
  // ── Near right symbol — personal ──
  { id:'R1h', worldX: 19800, side:'right', topPx: 55,
    lines:[
      'i keep waiting to feel the distance close',
      'you must be tired too'
    ]
  },
  { id:'R1',  worldX: 22600, side:'right', topPx: 148,
    lines:[
      'i have been watching your direction all along',
      'what we are moving toward or away from'
    ]
  },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let started    = false;
let startTime  = null;
let elapsed    = 0;
let margin     = 0;
let phase      = 0;  // 0=shrink 1=hold 2=passthrough 3=done
let phaseT     = 0;
let lastT      = null;

// Phase 2: symbols use fixed-position for pass-through
let sym2Active = false;
let symLScreenX = 0, symLScreenY = 0;
let symRScreenX = 0, symRScreenY = 0;

// Phase 2: expand box start rect
let expandStartLeft = 0, expandStartTop = 0, expandStartW = 0, expandStartH = 0;

// Smooth scroll target (lerped toward each frame)
let targetScrollLeft = 0;

// ── DOM ───────────────────────────────────────────────────────────────────────
const world        = document.getElementById('world');
const wrapper      = document.getElementById('scroll-wrapper');
const symLEl       = document.getElementById('sym-l');
const symREl       = document.getElementById('sym-r');
const expandBox    = document.getElementById('expand-box');
const whiteScreen  = document.getElementById('white-screen');
const beginOverlay = document.getElementById('begin-overlay');
const beginBtn     = document.getElementById('begin-btn');
const gotoEndBtn   = document.getElementById('goto-end');
const clockEl      = document.getElementById('clock');
const audio        = document.getElementById('audio');

// ── SYMBOLS ───────────────────────────────────────────────────────────────────
function makeSVG(d) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', SYM_W); svg.setAttribute('height', SYM_W);
  svg.setAttribute('viewBox', '0 0 40 40');
  const p = document.createElementNS(ns, 'path');
  p.setAttribute('d', d); p.setAttribute('fill', '#000');
  svg.appendChild(p); return svg;
}
symLEl.appendChild(makeSVG('M20,4 A16,16 0 0,0 20,36 Z'));  // C: flat right
symREl.appendChild(makeSVG('M20,4 A16,16 0 0,1 20,36 Z'));  // D: flat left

// ── TEXT ELEMENTS ─────────────────────────────────────────────────────────────
const sectionStates = SECTIONS.map(sec => {
  const el = document.createElement('div');
  el.className = 'text-section';
  el.style.top = sec.topPx + 'px';
  world.appendChild(el);
  return { sec, el, lineIdx: 0, twPhase: 'typing', twT: 0, displayText: '' };
});

// ── MARKS — spaced, subtle ────────────────────────────────────────────────────
const GLYPHS  = ['.', '·', '—', '×', '∙'];
const markEls = [];
{
  let s = 137;
  const rng = () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0xffffffff; };
  const placed = [];
  const MIN_SPACING = 260;
  let attempts = 0;
  while (placed.length < 65 && attempts < 12000) {
    attempts++;
    const wx = rng() * (FULL_W - 600) + 300;
    if (placed.some(p => Math.abs(p - wx) < MIN_SPACING)) continue;
    placed.push(wx);
    const yf = rng();
    const g  = GLYPHS[Math.floor(rng() * GLYPHS.length)];
    const el = document.createElement('span');
    el.className = 'mark';
    el.textContent = g;
    el.style.top = Math.floor(yf * PLANE_H) + 'px';
    el.dataset.wx = wx;
    world.appendChild(el);
    markEls.push(el);
  }
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function startAudio() {
  audio.currentTime = 0;
  audio.volume = 1.0;
  const p = audio.play();
  if (p && p.catch) p.catch(() => {});
}

// ── DRAG SCROLL ───────────────────────────────────────────────────────────────
let isDragging   = false;
let dragStartX   = 0;
let dragScrollAt = 0;

wrapper.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging      = true;
  dragStartX      = e.clientX;
  dragScrollAt    = wrapper.scrollLeft;
  targetScrollLeft = wrapper.scrollLeft;  // anchor target to current position
  wrapper.classList.add('dragging');
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  targetScrollLeft = dragScrollAt - (e.clientX - dragStartX) * DRAG_SENSITIVITY;
});
document.addEventListener('mouseup', () => {
  isDragging = false;
  wrapper.classList.remove('dragging');
  // target stays where it is — scroll coasts to a stop naturally via lerp
});
wrapper.addEventListener('wheel', e => e.preventDefault(), { passive: false });

let touchX = 0, touchScroll = 0;
wrapper.addEventListener('touchstart', e => {
  touchX           = e.touches[0].clientX;
  touchScroll      = wrapper.scrollLeft;
  targetScrollLeft = wrapper.scrollLeft;
}, { passive: true });
wrapper.addEventListener('touchmove', e => {
  targetScrollLeft = touchScroll - (e.touches[0].clientX - touchX) * DRAG_SENSITIVITY;
}, { passive: true });

// ── BEGIN ─────────────────────────────────────────────────────────────────────
beginBtn.addEventListener('click', () => {
  if (started) return;
  started = true;
  startAudio();
  beginOverlay.style.opacity = '0';
  setTimeout(() => { beginOverlay.style.display = 'none'; }, 1500);
  wrapper.scrollLeft = (FULL_W - window.innerWidth) / 2;
  targetScrollLeft   = wrapper.scrollLeft;
});

// GO TO END (debug)
gotoEndBtn.addEventListener('click', () => {
  if (!started) {
    started = true;
    beginOverlay.style.display = 'none';
    startAudio();
  }
  margin = MAX_MARGIN;
  phase  = 1;
  phaseT = 0;
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp  = (a, b, t)   => a + (b - a) * t;

function textOpacity(worldX, side) {
  const dist = side === 'left'
    ? worldX - margin
    : (FULL_W - worldX) - margin;
  const raw = clamp(1 - Math.max(0, dist) / 4000, 0, 1);
  return lerp(0.05, 0.85, raw);
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock(sec) {
  const s = Math.floor(sec) % 60;
  const m = Math.floor(sec / 60) % 60;
  const h = Math.floor(sec / 3600);
  clockEl.textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ── TYPEWRITER ────────────────────────────────────────────────────────────────
const TYPE_SPD  = 0.04;
const HOLD_DUR  = 8;
const FADE_DUR  = 6;
const PAUSE_DUR = 2;

function stepTypewriter(state, dt) {
  const lines = state.sec.lines;
  state.twT += dt;
  let fadeAlpha = 1;

  if (state.twPhase === 'typing') {
    const chars = Math.floor(state.twT / TYPE_SPD);
    state.displayText = lines[state.lineIdx].slice(0, chars);
    if (chars >= lines[state.lineIdx].length) {
      state.displayText = lines[state.lineIdx];
      state.twPhase = 'hold'; state.twT = 0;
    }
  } else if (state.twPhase === 'hold') {
    if (state.twT >= HOLD_DUR) { state.twPhase = 'fade'; state.twT = 0; }
  } else if (state.twPhase === 'fade') {
    fadeAlpha = clamp(1 - state.twT / FADE_DUR, 0, 1);
    if (state.twT >= FADE_DUR) {
      state.displayText = ''; state.twPhase = 'pause'; state.twT = 0;
    }
  } else if (state.twPhase === 'pause') {
    fadeAlpha = 0;
    if (state.twT >= PAUSE_DUR) {
      state.lineIdx = (state.lineIdx + 1) % lines.length;
      state.twPhase = 'typing'; state.twT = 0;
    }
  }
  return fadeAlpha;
}

// ── ENTER PASS-THROUGH (phase 1 → 2) ─────────────────────────────────────────
function enterPassthrough() {
  const lRect = symLEl.getBoundingClientRect();
  const rRect = symREl.getBoundingClientRect();
  symLScreenX = lRect.left;
  symLScreenY = lRect.top;
  symRScreenX = rRect.left;
  symRScreenY = rRect.top;

  // Move symbols to body so their z-index competes at the root stacking context
  // (inside #scroll-wrapper they'd be buried below expand-box and white-screen)
  document.body.appendChild(symLEl);
  document.body.appendChild(symREl);

  symLEl.style.position = 'fixed';
  symLEl.style.top  = symLScreenY + 'px';
  symLEl.style.left = symLScreenX + 'px';
  symLEl.style.transform = 'none';
  symLEl.style.zIndex = '60';

  symREl.style.position = 'fixed';
  symREl.style.top  = symRScreenY + 'px';
  symREl.style.left = symRScreenX + 'px';
  symREl.style.transform = 'none';
  symREl.style.zIndex = '60';

  // Capture expand box start — from world's current screen rect
  const worldRect = world.getBoundingClientRect();
  expandStartLeft = worldRect.left;
  expandStartTop  = worldRect.top;
  expandStartW    = worldRect.width;
  expandStartH    = worldRect.height;
  expandBox.style.left   = expandStartLeft + 'px';
  expandBox.style.top    = expandStartTop  + 'px';
  expandBox.style.width  = expandStartW    + 'px';
  expandBox.style.height = expandStartH    + 'px';
  expandBox.style.opacity = '1';

  sym2Active = true;
}

// ── FRAME LOOP ────────────────────────────────────────────────────────────────
function frame(ts) {
  requestAnimationFrame(frame);
  if (!started) return;

  if (!lastT) { lastT = ts; startTime = ts; }
  const dt = Math.min((ts - lastT) / 1000, 0.1);
  lastT = ts;
  elapsed = (ts - startTime) / 1000;
  updateClock(elapsed);

  // ── Phase 0: Shrink (ease-out cubic — slows as symbols approach) ──────────
  if (phase === 0) {
    const t = clamp(elapsed / SHRINK_DUR, 0, 1);
    const eased = 1 - Math.pow(1 - t, 3);   // ease-out cubic
    margin = eased * MAX_MARGIN;
    if (t >= 1) { phase = 1; phaseT = 0; }
  }

  // ── Phase 1: Hold ────────────────────────────────────────────────────────
  else if (phase === 1) {
    margin = MAX_MARGIN;
    phaseT += dt;
    if (phaseT >= HOLD_DUR_PHASE) {
      phase = 2; phaseT = 0;
      enterPassthrough();
    }
  }

  // ── Phase 2: Pass-through + expanding box + white fade ───────────────────
  else if (phase === 2) {
    phaseT += dt;

    // Symbols continue past each other at original approach speed
    symLScreenX += DEPART_SPEED * dt;
    symRScreenX -= DEPART_SPEED * dt;
    symLEl.style.left = symLScreenX + 'px';
    symREl.style.left = symRScreenX + 'px';

    // Expand white box from plane rect to full viewport (smoothstep ease)
    const expandT = clamp(phaseT / EXPAND_DUR, 0, 1);
    const easeE = expandT * expandT * (3 - 2 * expandT);
    const vw = window.innerWidth, vh = window.innerHeight;
    expandBox.style.left   = lerp(expandStartLeft, 0, easeE) + 'px';
    expandBox.style.top    = lerp(expandStartTop,  0, easeE) + 'px';
    expandBox.style.width  = lerp(expandStartW,   vw, easeE) + 'px';
    expandBox.style.height = lerp(expandStartH,   vh, easeE) + 'px';

    // White screen fades in after box is fully expanded + delay
    const fadeStart = EXPAND_DUR + FADE_DELAY;
    if (phaseT > fadeStart) {
      whiteScreen.style.opacity = clamp((phaseT - fadeStart) / FADE_DUR_END, 0, 1);
    }

    // Fade audio gently
    audio.volume = Math.max(0, audio.volume - dt * 0.04);

    if (phaseT > fadeStart + FADE_DUR_END + 1.0) phase = 3;
  }

  // ── Phase 3: Done — held white state ────────────────────────────────────
  // no updates needed

  // ── Smooth scroll toward target (gives world inertia/drift) ─────────────
  if (phase < 2) {
    wrapper.scrollLeft += (targetScrollLeft - wrapper.scrollLeft) * SCROLL_LERP;
  }

  // ── Compute current plane width ───────────────────────────────────────────
  const currentW = Math.max(2 * EDGE_PAD + SYM_W, FULL_W - 2 * margin);
  world.style.width = currentW + 'px';

  // Center plane when narrower than viewport
  const vw = window.innerWidth;
  world.style.marginLeft = currentW < vw ? ((vw - currentW) / 2) + 'px' : '0px';

  // ── Symbol positions (phases 0 and 1 only) ───────────────────────────────
  if (!sym2Active) {
    symLEl.style.left    = EDGE_PAD + 'px';
    symREl.style.left    = (currentW - SYM_W - EDGE_PAD) + 'px';
    symLEl.style.opacity = 1;
    symREl.style.opacity = 1;
  }

  // ── Text ─────────────────────────────────────────────────────────────────
  const showText = phase < 2;
  sectionStates.forEach(state => {
    const { sec, el } = state;
    const rx = sec.worldX - margin;
    if (!showText || rx < 0 || rx > currentW) {
      el.style.opacity = 0; el.textContent = ''; return;
    }
    el.style.left = rx + 'px';
    const baseOp    = textOpacity(sec.worldX, sec.side);
    const fadeAlpha = stepTypewriter(state, dt);
    el.textContent  = state.displayText;
    el.style.opacity = baseOp * fadeAlpha;
  });

  // ── Marks ────────────────────────────────────────────────────────────────
  markEls.forEach(el => {
    const wx = parseFloat(el.dataset.wx);
    const rx = wx - margin;
    if (!showText || rx < 0 || rx > currentW) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
      el.style.left = rx + 'px';
    }
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
world.style.width = FULL_W + 'px';
targetScrollLeft  = (FULL_W - window.innerWidth) / 2;  // start centered
requestAnimationFrame(frame);
</script>
</body>
</html>
