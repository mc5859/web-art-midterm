<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #111;
    user-select: none;
  }

  #scroll-wrapper {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    cursor: grab;
  }
  #scroll-wrapper.dragging { cursor: grabbing; }

  #world {
    position: relative;
    height: 200px;
    background: #fff;
    flex-shrink: 0;
    overflow: hidden;
  }

  .symbol {
    position: absolute;
    top: 50%;
    width: 80px; height: 80px;
    pointer-events: none;
    z-index: 10;
  }
  #sym-l { transform: translateY(-50%); }
  #sym-r { transform: translateY(calc(-50% + 6px)); }

  .text-section {
    position: absolute;
    font-family: 'VT323', monospace;
    font-size: 26px;
    color: #000;
    white-space: nowrap;
    pointer-events: none;
    line-height: 1;
    text-transform: lowercase;
  }

  .mark {
    position: absolute;
    font-family: 'VT323', monospace;
    font-size: 24px;
    color: #000;
    opacity: 0.15;
    pointer-events: none;
  }

  #goto-end {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #c00;
    color: #fff;
    border: none;
    padding: 5px 18px;
    font-family: monospace;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    z-index: 50;
    letter-spacing: 0.05em;
  }

  /* Expanding white box — grows from plane position to fill screen */
  #expand-box {
    position: fixed;
    background: #fff;
    pointer-events: none;
    z-index: 45;
    opacity: 0;
  }

  /* Final white fade overlay */
  #white-screen {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 55;
  }

  #begin-overlay {
    position: fixed;
    inset: 0;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    transition: opacity 1.4s ease;
  }

  #begin-btn {
    width: 90px; height: 90px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.45);
    color: rgba(255,255,255,0.6);
    font-family: 'VT323', monospace;
    font-size: 21px;
    letter-spacing: 0.12em;
    cursor: pointer;
    transition: border-color 0.25s, color 0.25s;
  }
  #begin-btn:hover {
    border-color: rgba(255,255,255,0.85);
    color: rgba(255,255,255,0.9);
  }

  #clock {
    position: fixed;
    bottom: 14px; right: 18px;
    font-family: monospace;
    font-size: 13px;
    color: #fff;
    opacity: 0.4;
    letter-spacing: 0.05em;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="scroll-wrapper">
  <div id="world">
    <div class="symbol" id="sym-l"></div>
    <div class="symbol" id="sym-r"></div>
    <button id="goto-end">GO TO END</button>
  </div>
</div>

<div id="expand-box"></div>
<div id="white-screen"></div>

<div id="begin-overlay">
  <button id="begin-btn">begin</button>
</div>

<div id="clock">00:00:00</div>

<!-- Two audio elements for seamless crossfade looping — no loop attribute -->
<audio id="audio-a" src="webartsong2.mp3"></audio>
<audio id="audio-b" src="webartsong2.mp3"></audio>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const FULL_W         = 24000;
const SYM_W          = 80;
const PLANE_H        = 200;
const EDGE_PAD       = 80;
const SHRINK_DUR     = 300;
const MAX_MARGIN     = (FULL_W - (2 * EDGE_PAD + SYM_W)) / 2;  // 11880
const APPROACH_SPEED = MAX_MARGIN / SHRINK_DUR;                 // ~39.6 px/s (avg)
const DEPART_SPEED   = APPROACH_SPEED * 0.8;                    // 20% slower than approach
const HOLD_DUR_PHASE   = 7.0;   // pause when symbols meet
const DRAG_SENSITIVITY = 0.54; // fraction of drag distance applied to scroll
const SCROLL_LERP      = 0.07; // lerp factor per frame — world drifts with inertia
const EXPAND_DUR     = 16.0;   // seconds for box to expand to fullscreen
const FADE_DELAY     = 2.5;    // seconds after box full before white fade starts
const FADE_DUR_END   = 4.0;    // white fade duration
const MUSIC_FADE_DUR = 5.0;    // seconds to fade music to 0 after screen is white
const CROSSFADE_DUR  = 10.0;   // seconds of crossfade overlap at each loop point

// ── TEXT SECTIONS ─────────────────────────────────────────────────────────────
// Each section has 3 lines — one chosen randomly each cycle (no repeats).
// worldX positions create a density gradient: sparse at edges, dense near center.
const SECTIONS = [
  // S01 · LEFT · far outer · bright from start
  { id:'S01', worldX: 1400,  side:'left',  topPx: 42,
    lines:['are you as scared as i am', 'i am uneasy', 'it is unsteady'] },

  // S02 · LEFT · outer · bright from start
  { id:'S02', worldX: 3200,  side:'left',  topPx: 130,
    lines:['do you think about me', 'i am always thinking about you', 'am i on your mind'] },

  // S03 · LEFT · outer-middle · glows ~0:30
  { id:'S03', worldX: 5500,  side:'left',  topPx: 65,
    lines:['i wonder what your end looks like from here', 'do you feel the same cold', 'do you also feel the wind'] },

  // S04 · LEFT · middle · glows ~1:00
  { id:'S04', worldX: 8000,  side:'left',  topPx: 148,
    lines:['the same day again', 'alright', 'still going'] },

  // S05 · LEFT · inner-middle · glows ~1:30
  { id:'S05', worldX: 9500,  side:'left',  topPx: 50,
    lines:['the ground changes here', 'the same day again', 'i do not think i will learn'] },

  // S06 · LEFT · inner · glows ~2:00
  { id:'S06', worldX: 10500, side:'left',  topPx: 120,
    lines:['closer than before', 'another step', 'another day'] },

  // S07 · LEFT · near center · glows ~2:30
  { id:'S07', worldX: 11100, side:'left',  topPx: 75,
    lines:['where are you now', 'soon', 'do you see me'] },

  // S08 · LEFT · closest to meeting · glows ~3:00
  { id:'S08', worldX: 11600, side:'left',  topPx: 140,
    lines:['brush', 'run', 'hide'] },

  // ── MEETING POINT — special reveal ~4:00 ───────────────────────────────────
  { id:'L3',  worldX: 11900, side:'left',  topPx: 88,  revealAtEnd: true,
    twTypeSec: 0.10, twHoldSec: 4.5, twFadeSec: 3.5, twPauseSec: 2.0,
    lines:['i am here', 'i am here'] },
  { id:'R3',  worldX: 12100, side:'right', topPx: 88,  revealAtEnd: true,
    twTypeSec: 0.10, twHoldSec: 4.5, twFadeSec: 3.5, twPauseSec: 2.0,
    lines:['i am here', 'i am here'] },

  // S09 · RIGHT · closest to meeting · glows ~3:00
  { id:'S09', worldX: 12400, side:'right', topPx: 55,
    lines:['gentle', 'hold', 'carry'] },

  // S10 · RIGHT · near center · glows ~2:30
  { id:'S10', worldX: 12900, side:'right', topPx: 125,
    lines:['every step', 'and if i turned back now', 'almost'] },

  // S11 · RIGHT · inner · glows ~2:00
  { id:'S11', worldX: 13500, side:'right', topPx: 70,
    lines:['i cannot tell what i am learning', 'i cannot be held', 'will you be okay'] },

  // S12 · RIGHT · inner-middle · glows ~1:30
  { id:'S12', worldX: 15000, side:'right', topPx: 145,
    lines:['will i be okay', 'i cannot tell if this is growth', 'you must be cold too'] },

  // S13 · RIGHT · middle · glows ~1:00
  { id:'S13', worldX: 16200, side:'right', topPx: 48,
    lines:['okay then', 'i keep waiting', 'you must be scared too'] },

  // S14 · RIGHT · outer-middle · glows ~0:30
  { id:'S14', worldX: 18500, side:'right', topPx: 118,
    lines:['i look in your direction', 'you must be tired too', 'the same day again'] },

  // S15 · RIGHT · outer · bright from start
  { id:'S15', worldX: 20500, side:'right', topPx: 72,
    lines:['i think about you always', 'do you think about me', 'is it too soon to remember'] },

  // S16 · RIGHT · far outer · bright from start
  { id:'S16', worldX: 22600, side:'right', topPx: 138,
    lines:['i fear', 'do you feel free', 'i cannot stand still'] },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let started    = false;
let startTime  = null;
let elapsed    = 0;
let margin     = 0;
let phase      = 0;  // 0=shrink 1=hold 2=passthrough 3=done
let phaseT     = 0;
let lastT      = null;

// Phase 2: symbols use fixed-position for pass-through
let sym2Active = false;
let symLScreenX = 0, symLScreenY = 0;
let symRScreenX = 0, symRScreenY = 0;

// Phase 2: expand box start rect
let expandStartLeft = 0, expandStartTop = 0, expandStartW = 0, expandStartH = 0;

// Music fade: set once when both circles are off-screen and white is fully opaque
let musicFadeStartT = -1;
// Phase 3 entry: run cleanup once
let phase3Entered = false;

// Music crossfade state
let masterVolume  = 1.0;    // global volume scalar (0–1), applied to all audio
let activeAudio   = null;   // currently playing audio element
let nextAudio     = null;   // element queued for next loop
let xfadeActive   = false;  // true during crossfade window
let xfadeT        = 0;      // elapsed time into current crossfade
let audioPlaying  = false;  // true once startAudio() fires

// Smooth scroll target (lerped toward each frame)
let targetScrollLeft = 0;

// ── DOM ───────────────────────────────────────────────────────────────────────
const world        = document.getElementById('world');
const wrapper      = document.getElementById('scroll-wrapper');
const symLEl       = document.getElementById('sym-l');
const symREl       = document.getElementById('sym-r');
const expandBox    = document.getElementById('expand-box');
const whiteScreen  = document.getElementById('white-screen');
const beginOverlay = document.getElementById('begin-overlay');
const beginBtn     = document.getElementById('begin-btn');
const gotoEndBtn   = document.getElementById('goto-end');
const clockEl      = document.getElementById('clock');
const audioA       = document.getElementById('audio-a');
const audioB       = document.getElementById('audio-b');

// ── SYMBOLS ───────────────────────────────────────────────────────────────────
function makeSVG(d) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', SYM_W); svg.setAttribute('height', SYM_W);
  svg.setAttribute('viewBox', '0 0 40 40');
  const p = document.createElementNS(ns, 'path');
  p.setAttribute('d', d); p.setAttribute('fill', '#000');
  svg.appendChild(p); return svg;
}
symLEl.appendChild(makeSVG('M20,4 A16,16 0 0,0 20,36 Z'));  // C: flat right
symREl.appendChild(makeSVG('M20,4 A16,16 0 0,1 20,36 Z'));  // D: flat left

// ── TEXT ELEMENTS ─────────────────────────────────────────────────────────────
const sectionStates = SECTIONS.map(sec => {
  const el = document.createElement('div');
  el.className = 'text-section';
  el.style.top = sec.topPx + 'px';
  // Center revealAtEnd text around its worldX anchor (not left-anchored)
  if (sec.revealAtEnd) el.style.transform = 'translateX(-50%)';
  world.appendChild(el);
  const startIdx = Math.floor(Math.random() * sec.lines.length);
  return { sec, el, lineIdx: startIdx, twPhase: 'typing', twT: 0, displayText: '', twStopped: false };
});

// ── MARKS — spaced, subtle ────────────────────────────────────────────────────
const GLYPHS  = ['.', '·', '—', '×', '∙'];
const markEls = [];
{
  let s = 137;
  const rng = () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 0xffffffff; };
  const placed = [];
  const MIN_SPACING = 260;
  let attempts = 0;
  while (placed.length < 65 && attempts < 12000) {
    attempts++;
    const wx = rng() * (FULL_W - 600) + 300;
    if (placed.some(p => Math.abs(p - wx) < MIN_SPACING)) continue;
    placed.push(wx);
    const yf = rng();
    const g  = GLYPHS[Math.floor(rng() * GLYPHS.length)];
    const el = document.createElement('span');
    el.className = 'mark';
    el.textContent = g;
    el.style.top = Math.floor(yf * PLANE_H) + 'px';
    el.dataset.wx = wx;
    world.appendChild(el);
    markEls.push(el);
  }
}

// ── CLICK MARKS + BUMP SOUND ─────────────────────────────────────────────────
const CLICK_GLYPHS = ['.', '·', '—', '×', '∙', '+', '/', '|', '*', '`', '~', '^'];
const clickMarkEls = [];
let bumpCtx = null;

function playClickBump() {
  try {
    if (!bumpCtx) bumpCtx = new (window.AudioContext || window.webkitAudioContext)();
    const play = () => {
      const dur = 0.09;
      const buf = bumpCtx.createBuffer(1, Math.floor(bumpCtx.sampleRate * dur), bumpCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
      const src = bumpCtx.createBufferSource();
      src.buffer = buf;
      const lpf = bumpCtx.createBiquadFilter();
      lpf.type = 'lowpass'; lpf.frequency.value = 160;
      const gain = bumpCtx.createGain();
      gain.gain.setValueAtTime(0.06, bumpCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, bumpCtx.currentTime + dur);
      src.connect(lpf); lpf.connect(gain); gain.connect(bumpCtx.destination);
      src.start();
    };
    if (bumpCtx.state === 'suspended') {
      bumpCtx.resume().then(play);
    } else {
      play();
    }
  } catch(e) {}
}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function startAudio() {
  activeAudio  = audioA;
  nextAudio    = audioB;
  audioPlaying = true;
  activeAudio.currentTime = 0;
  activeAudio.volume      = masterVolume;
  const p = activeAudio.play();
  if (p && p.catch) p.catch(() => {});
}

// Call once per frame — handles seamless crossfade looping
function manageCrossfade(dt) {
  if (!audioPlaying || !activeAudio) return;
  const dur = activeAudio.duration;
  if (!dur || isNaN(dur)) return;  // not loaded yet

  const timeLeft = dur - activeAudio.currentTime;

  // Kick off crossfade when we're CROSSFADE_DUR seconds from the end
  if (!xfadeActive && timeLeft <= CROSSFADE_DUR && timeLeft > 0) {
    xfadeActive = true;
    xfadeT      = 0;
    nextAudio.currentTime = 0;
    nextAudio.volume      = 0;
    const p = nextAudio.play();
    if (p && p.catch) p.catch(() => {});
  }

  if (xfadeActive) {
    xfadeT += dt;
    const xf = clamp(xfadeT / CROSSFADE_DUR, 0, 1);
    activeAudio.volume = masterVolume * (1 - xf);
    nextAudio.volume   = masterVolume * xf;

    if (xf >= 1.0 || activeAudio.currentTime >= dur - 0.05) {
      // Crossfade complete — swap roles
      activeAudio.pause();
      activeAudio.currentTime = 0;
      const tmp = activeAudio;
      activeAudio  = nextAudio;
      nextAudio    = tmp;
      activeAudio.volume = masterVolume;
      nextAudio.volume   = 0;
      xfadeActive = false;
      xfadeT      = 0;
    }
  } else {
    activeAudio.volume = masterVolume;
  }
}

// ── DRAG SCROLL ───────────────────────────────────────────────────────────────
let isDragging   = false;
let dragStartX   = 0;
let dragScrollAt = 0;

wrapper.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  isDragging      = true;
  dragStartX      = e.clientX;
  dragScrollAt    = wrapper.scrollLeft;
  targetScrollLeft = wrapper.scrollLeft;
  wrapper.classList.add('dragging');
  e.preventDefault();

  // Place a click mark at the cursor position (only inside world, only before circles touch)
  if (phase < 1 && started) {
    const worldRect = world.getBoundingClientRect();
    if (e.clientX >= worldRect.left && e.clientX <= worldRect.right &&
        e.clientY >= worldRect.top  && e.clientY <= worldRect.bottom) {
      const rx = e.clientX - worldRect.left;
      const ry = e.clientY - worldRect.top;
      const el = document.createElement('span');
      el.className = 'mark';
      el.textContent = CLICK_GLYPHS[Math.floor(Math.random() * CLICK_GLYPHS.length)];
      el.style.top = Math.floor(ry) + 'px';
      el.dataset.wx = rx + margin;  // store world coordinate
      world.appendChild(el);
      clickMarkEls.push(el);
      playClickBump();
    }
  }
});
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  targetScrollLeft = dragScrollAt - (e.clientX - dragStartX) * DRAG_SENSITIVITY;
});
document.addEventListener('mouseup', () => {
  isDragging = false;
  wrapper.classList.remove('dragging');
  // target stays where it is — scroll coasts to a stop naturally via lerp
});
wrapper.addEventListener('wheel', e => e.preventDefault(), { passive: false });

let touchX = 0, touchScroll = 0;
wrapper.addEventListener('touchstart', e => {
  touchX           = e.touches[0].clientX;
  touchScroll      = wrapper.scrollLeft;
  targetScrollLeft = wrapper.scrollLeft;
}, { passive: true });
wrapper.addEventListener('touchmove', e => {
  targetScrollLeft = touchScroll - (e.touches[0].clientX - touchX) * DRAG_SENSITIVITY;
}, { passive: true });

// ── BEGIN ─────────────────────────────────────────────────────────────────────
beginBtn.addEventListener('click', () => {
  if (started) return;
  started = true;
  startAudio();
  beginOverlay.style.opacity = '0';
  setTimeout(() => { beginOverlay.style.display = 'none'; }, 1500);
  wrapper.scrollLeft = (FULL_W - window.innerWidth) / 2;
  targetScrollLeft   = wrapper.scrollLeft;
});

// GO TO 4:00 (debug — jumps to 4-minute mark to preview "I am here" reveal)
gotoEndBtn.addEventListener('click', () => {
  if (!started) {
    started = true;
    beginOverlay.style.display = 'none';
  }

  // Reset phase-2 / phase-3 state
  sym2Active     = false;
  musicFadeStartT = -1;
  phase3Entered  = false;
  phase = 0; phaseT = 0;

  // Restore symbols into world div and clear phase-2 style overrides
  if (!world.contains(symLEl)) world.appendChild(symLEl);
  if (!world.contains(symREl)) world.appendChild(symREl);
  for (const el of [symLEl, symREl]) {
    el.style.position = '';
    el.style.top      = '';
    el.style.left     = '';
    el.style.transform = '';
    el.style.zIndex   = '';
    el.style.opacity  = '';
    el.style.display  = '';
  }

  // Reset overlays
  expandBox.style.opacity   = '0';
  whiteScreen.style.opacity = '0';

  // Reset "I am here" stopped flag so it can cycle again after jump
  sectionStates.forEach(s => { s.twStopped = false; });

  // Reset audio crossfade state and restart cleanly
  masterVolume = 1.0;
  xfadeActive  = false;
  xfadeT       = 0;
  if (audioA) { audioA.pause(); audioA.currentTime = 0; audioA.volume = 0; }
  if (audioB) { audioB.pause(); audioB.currentTime = 0; audioB.volume = 0; }
  activeAudio  = audioA;
  nextAudio    = audioB;
  audioPlaying = true;
  activeAudio.volume = masterVolume;
  const gp = activeAudio.play();
  if (gp && gp.catch) gp.catch(() => {});

  // Jump to 3:30 elapsed — frame loop recomputes margin from elapsed
  if (lastT !== null) startTime = lastT - 210 * 1000;
});

// ── HELPERS ───────────────────────────────────────────────────────────────────
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp  = (a, b, t)   => a + (b - a) * t;

function textOpacity(worldX, side, revealAtEnd) {
  if (revealAtEnd) {
    // Invisible until ~3:40 (98.1% converged), then fade in as circles close
    const thresh = MAX_MARGIN * 0.981;
    return lerp(0, 0.85, clamp((margin - thresh) / (MAX_MARGIN - thresh), 0, 1));
  }
  const dist = side === 'left'
    ? worldX - margin
    : (FULL_W - worldX) - margin;
  const raw = clamp(1 - Math.max(0, dist) / 4000, 0, 1);
  return lerp(0.05, 0.85, raw);
}

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function updateClock(sec) {
  const s = Math.floor(sec) % 60;
  const m = Math.floor(sec / 60) % 60;
  const h = Math.floor(sec / 3600);
  clockEl.textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ── TYPEWRITER ────────────────────────────────────────────────────────────────
const TYPE_SPD  = 0.04;
const HOLD_DUR  = 8;
const FADE_DUR  = 6;
const PAUSE_DUR = 2;

function stepTypewriter(state, dt) {
  const lines    = state.sec.lines;
  const typeSpd  = state.sec.twTypeSec  ?? TYPE_SPD;
  const holdDur  = state.sec.twHoldSec  ?? HOLD_DUR;
  const fadeDur  = state.sec.twFadeSec  ?? FADE_DUR;
  const pauseDur = state.sec.twPauseSec ?? PAUSE_DUR;
  state.twT += dt;
  let fadeAlpha = 1;

  if (state.twPhase === 'typing') {
    const chars = Math.floor(state.twT / typeSpd);
    state.displayText = lines[state.lineIdx].slice(0, chars);
    if (chars >= lines[state.lineIdx].length) {
      state.displayText = lines[state.lineIdx];
      state.twPhase = 'hold'; state.twT = 0;
    }
  } else if (state.twPhase === 'hold') {
    if (state.twT >= holdDur) { state.twPhase = 'fade'; state.twT = 0; }
  } else if (state.twPhase === 'fade') {
    fadeAlpha = clamp(1 - state.twT / fadeDur, 0, 1);
    if (state.twT >= fadeDur) {
      state.displayText = ''; state.twPhase = 'pause'; state.twT = 0;
    }
  } else if (state.twPhase === 'pause') {
    fadeAlpha = 0;
    if (!state.twStopped && state.twT >= pauseDur) {
      const choices = lines.map((_, i) => i).filter(i => i !== state.lineIdx);
      state.lineIdx = choices[Math.floor(Math.random() * choices.length)];
      state.twPhase = 'typing'; state.twT = 0;
    }
  }
  return fadeAlpha;
}

// ── ENTER PASS-THROUGH (phase 1 → 2) ─────────────────────────────────────────
function enterPassthrough() {
  const lRect = symLEl.getBoundingClientRect();
  const rRect = symREl.getBoundingClientRect();
  symLScreenX = lRect.left;
  symLScreenY = lRect.top;
  symRScreenX = rRect.left;
  symRScreenY = rRect.top;

  // Move symbols to body so their z-index competes at the root stacking context
  // (inside #scroll-wrapper they'd be buried below expand-box and white-screen)
  document.body.appendChild(symLEl);
  document.body.appendChild(symREl);

  symLEl.style.position = 'fixed';
  symLEl.style.top  = symLScreenY + 'px';
  symLEl.style.left = symLScreenX + 'px';
  symLEl.style.transform = 'none';
  symLEl.style.zIndex = '60';

  symREl.style.position = 'fixed';
  symREl.style.top  = symRScreenY + 'px';
  symREl.style.left = symRScreenX + 'px';
  symREl.style.transform = 'none';
  symREl.style.zIndex = '60';

  // Capture expand box start — from world's current screen rect
  const worldRect = world.getBoundingClientRect();
  expandStartLeft = worldRect.left;
  expandStartTop  = worldRect.top;
  expandStartW    = worldRect.width;
  expandStartH    = worldRect.height;
  expandBox.style.left   = expandStartLeft + 'px';
  expandBox.style.top    = expandStartTop  + 'px';
  expandBox.style.width  = expandStartW    + 'px';
  expandBox.style.height = expandStartH    + 'px';
  expandBox.style.opacity = '1';

  sym2Active = true;
}

// ── FRAME LOOP ────────────────────────────────────────────────────────────────
function frame(ts) {
  requestAnimationFrame(frame);
  if (!started) return;

  if (!lastT) { lastT = ts; startTime = ts; }
  const dt = Math.min((ts - lastT) / 1000, 0.1);
  lastT = ts;
  elapsed = (ts - startTime) / 1000;
  updateClock(elapsed);
  manageCrossfade(dt);

  // ── Phase 0: Shrink (ease-out cubic — slows as symbols approach) ──────────
  if (phase === 0) {
    const t = clamp(elapsed / SHRINK_DUR, 0, 1);
    const eased = 1 - Math.pow(1 - t, 3);   // ease-out cubic
    margin = eased * MAX_MARGIN;
    if (t >= 1) { phase = 1; phaseT = 0; }
  }

  // ── Phase 1: Hold ────────────────────────────────────────────────────────
  else if (phase === 1) {
    margin = MAX_MARGIN;
    phaseT += dt;
    if (phaseT >= HOLD_DUR_PHASE) {
      phase = 2; phaseT = 0;
      enterPassthrough();
    }
  }

  // ── Phase 2: Pass-through + expanding box + white fade ───────────────────
  else if (phase === 2) {
    phaseT += dt;

    // Symbols continue past each other at original approach speed
    symLScreenX += DEPART_SPEED * dt;
    symRScreenX -= DEPART_SPEED * dt;
    symLEl.style.left = symLScreenX + 'px';
    symREl.style.left = symRScreenX + 'px';

    // Expand white box from plane rect to full viewport (smoothstep ease)
    const expandT = clamp(phaseT / EXPAND_DUR, 0, 1);
    const easeE = expandT * expandT * (3 - 2 * expandT);
    const vw = window.innerWidth, vh = window.innerHeight;
    expandBox.style.left   = lerp(expandStartLeft, 0, easeE) + 'px';
    expandBox.style.top    = lerp(expandStartTop,  0, easeE) + 'px';
    expandBox.style.width  = lerp(expandStartW,   vw, easeE) + 'px';
    expandBox.style.height = lerp(expandStartH,   vh, easeE) + 'px';

    // White screen fades in after box is fully expanded + delay
    const fadeStart = EXPAND_DUR + FADE_DELAY;
    if (phaseT > fadeStart) {
      whiteScreen.style.opacity = clamp((phaseT - fadeStart) / FADE_DUR_END, 0, 1);
    }

    // Music fade: triggered once both circles are off-screen AND white is fully opaque
    const vwCheck = window.innerWidth;
    const symLOff = symLScreenX > vwCheck + SYM_W;
    const symROff = symRScreenX < -SYM_W;
    const screenWhite = parseFloat(whiteScreen.style.opacity) >= 1.0;
    if (musicFadeStartT < 0 && symLOff && symROff && screenWhite) {
      musicFadeStartT = phaseT;
    }
    if (musicFadeStartT >= 0) {
      masterVolume = Math.max(0, 1.0 - (phaseT - musicFadeStartT) / MUSIC_FADE_DUR);
    }

    if (musicFadeStartT >= 0 && phaseT > musicFadeStartT + MUSIC_FADE_DUR + 1.0) phase = 3;
  }

  // ── Phase 3: Done — hide symbols, hold white state ───────────────────────
  else if (phase === 3) {
    if (!phase3Entered) {
      phase3Entered = true;
      symLEl.style.display = 'none';
      symREl.style.display = 'none';
    }
  }

  // ── Smooth scroll toward target (gives world inertia/drift) ─────────────
  if (phase < 2) {
    wrapper.scrollLeft += (targetScrollLeft - wrapper.scrollLeft) * SCROLL_LERP;
  }

  // ── Compute current plane width ───────────────────────────────────────────
  const currentW = Math.max(2 * EDGE_PAD + SYM_W, FULL_W - 2 * margin);
  world.style.width = currentW + 'px';

  // Center plane when narrower than viewport
  const vw = window.innerWidth;
  world.style.marginLeft = currentW < vw ? ((vw - currentW) / 2) + 'px' : '0px';

  // ── Symbol positions (phases 0 and 1 only) ───────────────────────────────
  if (!sym2Active) {
    symLEl.style.left    = EDGE_PAD + 'px';
    symREl.style.left    = (currentW - SYM_W - EDGE_PAD) + 'px';
    symLEl.style.opacity = 1;
    symREl.style.opacity = 1;
  }

  // ── Text ─────────────────────────────────────────────────────────────────
  const showText = phase < 2;
  sectionStates.forEach(state => {
    const { sec, el } = state;
    // Once circles touch (phase ≥ 1), let revealAtEnd finish current cycle then stop
    if (phase >= 1 && sec.revealAtEnd) state.twStopped = true;
    const rx = sec.worldX - margin;
    if (!showText || rx < 0 || rx > currentW) {
      el.style.opacity = 0; el.textContent = ''; return;
    }
    el.style.left = rx + 'px';
    const baseOp    = textOpacity(sec.worldX, sec.side, sec.revealAtEnd);
    const fadeAlpha = stepTypewriter(state, dt);
    el.textContent  = state.displayText;
    el.style.opacity = baseOp * fadeAlpha;
  });

  // ── Marks ────────────────────────────────────────────────────────────────
  markEls.forEach(el => {
    const wx = parseFloat(el.dataset.wx);
    const rx = wx - margin;
    if (!showText || rx < 0 || rx > currentW) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
      el.style.left = rx + 'px';
    }
  });

  // ── Click marks ───────────────────────────────────────────────────────────
  clickMarkEls.forEach(el => {
    const wx = parseFloat(el.dataset.wx);
    const rx = wx - margin;
    if (!showText || rx < 0 || rx > currentW) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
      el.style.left = rx + 'px';
    }
  });
}

// ── INIT ─────────────────────────────────────────────────────────────────────
world.style.width = FULL_W + 'px';
targetScrollLeft  = (FULL_W - window.innerWidth) / 2;  // start centered
requestAnimationFrame(frame);
</script>
</body>
</html>
