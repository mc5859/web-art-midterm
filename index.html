<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #111;
  }

  #scroll-wrapper {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow-x: scroll;
    overflow-y: hidden;
    display: flex;
    align-items: center;
    cursor: default;
  }

  #scroll-wrapper::-webkit-scrollbar { display: none; }
  #scroll-wrapper { scrollbar-width: none; }

  #world {
    position: relative;
    width: 6000px;
    height: 160px;
    flex-shrink: 0;
  }

  #plane {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    height: 100px;
    background: #fff;
    overflow: hidden;
    /* left and width set by JS */
  }

  .text-section {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'VT323', monospace;
    font-size: 17px;
    color: #000;
    white-space: nowrap;
    line-height: 1.5;
    pointer-events: none;
    /* left set by JS, opacity set by JS */
  }

  .mark {
    position: absolute;
    font-family: 'VT323', monospace;
    font-size: 13px;
    color: #000;
    opacity: 0.08;
    pointer-events: none;
  }

  .symbol {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 40px;
    height: 40px;
    pointer-events: none;
    z-index: 10;
  }

  #crack {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
    background: #000;
    width: 0;
    height: 0;
    z-index: 20;
    pointer-events: none;
  }

  #clock {
    position: fixed;
    bottom: 14px;
    right: 18px;
    font-family: monospace;
    font-size: 9px;
    color: #fff;
    opacity: 0.15;
    letter-spacing: 0.05em;
    pointer-events: none;
    z-index: 100;
  }
</style>
</head>
<body>

<div id="scroll-wrapper">
  <div id="world">
    <div id="plane"></div>
  </div>
</div>

<div id="clock">00:00:00</div>

<audio id="audio" loop preload="auto">
  <source src="webartsong.mp3" type="audio/mpeg">
</audio>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const WORLD_W       = 6000;
const PLANE_H       = 100;
const SYM_W         = 40;
const SYM_H         = 40;
const SHRINK_DUR    = 300;   // seconds for full shrink
const MAX_MARGIN    = (WORLD_W - SYM_W * 2) / 2;  // 2960px
const MIN_SOUND     = 0.12;

// Text world positions (left edge of text block, in world coordinates)
const SECTIONS = [
  {
    id: 'L1', worldX: 350, side: 'left',
    lines: [
      'the wall begins here at the water',
      'this is the first day',
      'the body knows only that it is moving',
      'facing west'
    ]
  },
  {
    id: 'L2', worldX: 1500, side: 'left',
    lines: [
      'this was supposed to be something else',
      'by the time we started',
      'it had already become an ending',
      'i wonder what your end looks like',
      'the distance behind is the same',
      'as the distance ahead',
      'still walking'
    ]
  },
  {
    id: 'L3', worldX: 2600, side: 'left',
    lines: [
      'the end is legible now',
      'every step toward',
      'every step away',
      'this is how you end something large',
      'you make it last long enough',
      'to deserve what it was',
      'i am almost there'
    ]
  },
  {
    id: 'R3', worldX: 3400, side: 'right',
    lines: [
      'almost',
      'the ground is hard here',
      'i have been walking toward this',
      'it will be enough'
    ]
  },
  {
    id: 'R2', worldX: 4500, side: 'right',
    lines: [
      'the same day again',
      'the wall crumbles here',
      'no one restored it',
      'i think of the other end',
      'what it was supposed to be',
      'still'
    ]
  },
  {
    id: 'R1', worldX: 5650, side: 'right',
    lines: [
      'the wall ends here at the sand',
      'day one',
      'facing east',
      'the wind was cold'
    ]
  }
];

// Sparse marks: [worldX, planeLocalY_fraction, glyph]
const MARKS_DATA = [
  [180, 0.25, '·'], [420, 0.72, '—'], [710, 0.4, '·'],
  [950, 0.6, '×'], [1100, 0.3, '·'], [1280, 0.8, '—'],
  [1650, 0.45, '·'], [1820, 0.2, '·'], [2050, 0.65, '×'],
  [2200, 0.38, '·'], [2350, 0.7, '—'], [2480, 0.5, '·'],
  [2700, 0.3, '×'], [2800, 0.6, '·'], [2900, 0.25, '—'],
  [3050, 0.7, '·'], [3150, 0.4, '×'], [3300, 0.55, '·'],
  [3450, 0.8, '—'], [3600, 0.35, '·'], [3780, 0.6, '·'],
  [3950, 0.22, '×'], [4150, 0.75, '·'], [4320, 0.5, '—'],
  [4480, 0.3, '·'], [4650, 0.65, '·'], [4850, 0.4, '×'],
  [5000, 0.7, '·'], [5150, 0.28, '—'], [5300, 0.55, '·'],
  [5500, 0.4, '·'], [5720, 0.62, '·'], [5850, 0.35, '×'],
  [760, 0.55, '·'], [1400, 0.3, '—'], [2150, 0.8, '·'],
  [3700, 0.45, '·'], [4080, 0.6, '—'], [4700, 0.22, '·'],
  [5200, 0.7, '×']
];

// ─── STATE ────────────────────────────────────────────────────────────────────
let startTime     = null;
let elapsed       = 0;
let margin        = 0;
let phase         = 0; // 0=shrinking 1=passthrough 2=circle 3=crack 4=expansion
let phaseTimer    = 0;

// Symbol positions in world coords (left edge of symbol)
let symLX = 0;
let symRX = WORLD_W - SYM_W;

// Meeting pass-through
let passDuration   = 1.5;
let passStartLX    = 0;
let passStartRX    = 0;
let passTargetOffset = 30; // how far they pass each other

// Crack element
let crackMaxW = 60, crackMaxH = 90;
let crackCenterX = WORLD_W / 2;

// Audio
let audioUnlocked = false;
const audio = document.getElementById('audio');

// ─── DOM SETUP ────────────────────────────────────────────────────────────────
const world      = document.getElementById('world');
const plane      = document.getElementById('plane');
const wrapper    = document.getElementById('scroll-wrapper');
const clockEl    = document.getElementById('clock');

// Symbols (SVG semicircles)
function makeSVG(facing) {
  // facing: 'right' = D shape (right-facing open half)
  //         'left'  = C shape (left-facing open half)
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', SYM_W);
  svg.setAttribute('height', SYM_H);
  svg.setAttribute('viewBox', '0 0 40 40');
  const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  if (facing === 'right') {
    // Right-facing D: flat edge on left, arc on right
    path.setAttribute('d', 'M20,4 A16,16 0 0,1 20,36 L20,4 Z');
  } else {
    // Left-facing C: flat edge on right, arc on left
    path.setAttribute('d', 'M20,4 A16,16 0 0,0 20,36 L20,4 Z');
  }
  path.setAttribute('fill', '#000');
  svg.appendChild(path);
  return svg;
}

const symLEl = document.createElement('div');
symLEl.className = 'symbol';
symLEl.appendChild(makeSVG('right'));
world.appendChild(symLEl);

const symREl = document.createElement('div');
symREl.className = 'symbol';
symREl.appendChild(makeSVG('left'));
world.appendChild(symREl);

// Crack element
const crackEl = document.createElement('div');
crackEl.id = 'crack';
world.appendChild(crackEl);

// Text sections
const sectionEls = SECTIONS.map(sec => {
  const div = document.createElement('div');
  div.className = 'text-section';
  div.dataset.id = sec.id;
  // We'll manage content via typewriter
  plane.appendChild(div);
  return { sec, el: div, charIdx: 0, lineIdx: 0, phase: 'typing', phaseT: 0, displayText: '' };
});

// Marks
MARKS_DATA.forEach(([wx, yf, glyph]) => {
  const span = document.createElement('span');
  span.className = 'mark';
  span.textContent = glyph;
  span.style.left = (wx - 0) + 'px'; // relative to plane left, adjusted each frame
  span.style.top = (yf * PLANE_H) + 'px';
  span.dataset.worldX = wx;
  plane.appendChild(span);
});

const markEls = plane.querySelectorAll('.mark');

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t)    { return a + (b - a) * t; }

function textOpacity(worldX, side, currentMargin) {
  let dist;
  if (side === 'left') {
    dist = worldX - currentMargin;
  } else {
    dist = (WORLD_W - worldX) - currentMargin;
  }
  dist = Math.max(0, dist);
  const maxDist = 2500;
  const raw = clamp(1 - dist / maxDist, 0, 1);
  return lerp(0.05, 0.85, raw);
}

// ─── CLOCK ────────────────────────────────────────────────────────────────────
let clockSec = 0;
function updateClock(elapsedSec) {
  const s = Math.floor(elapsedSec) % 60;
  const m = Math.floor(elapsedSec / 60) % 60;
  const h = Math.floor(elapsedSec / 3600);
  clockEl.textContent =
    String(h).padStart(2,'0') + ':' +
    String(m).padStart(2,'0') + ':' +
    String(s).padStart(2,'0');
}

// ─── TYPEWRITER ───────────────────────────────────────────────────────────────
// Each section cycles: type each line fully, hold, fade, pause, next line
const TYPE_SPEED  = 0.04; // seconds per character
const HOLD_DUR    = 8;
const FADE_DUR    = 6;
const PAUSE_DUR   = 2;

function updateTypewriter(state, dt) {
  const { sec } = state;
  const lines = sec.lines;

  state.phaseT += dt;

  if (state.phase === 'typing') {
    const fullLine = lines[state.lineIdx];
    const charsToShow = Math.floor(state.phaseT / TYPE_SPEED);
    state.displayText = fullLine.slice(0, charsToShow);
    if (charsToShow >= fullLine.length) {
      state.displayText = fullLine;
      state.phase = 'hold';
      state.phaseT = 0;
    }
  } else if (state.phase === 'hold') {
    if (state.phaseT >= HOLD_DUR) {
      state.phase = 'fade';
      state.phaseT = 0;
    }
  } else if (state.phase === 'fade') {
    if (state.phaseT >= FADE_DUR) {
      state.displayText = '';
      state.phase = 'pause';
      state.phaseT = 0;
    }
  } else if (state.phase === 'pause') {
    if (state.phaseT >= PAUSE_DUR) {
      state.lineIdx = (state.lineIdx + 1) % lines.length;
      state.phase = 'typing';
      state.phaseT = 0;
      state.displayText = '';
    }
  }

  // Compute fade alpha overlay for the 'fade' phase
  let fadeAlpha = 1;
  if (state.phase === 'fade') {
    fadeAlpha = clamp(1 - state.phaseT / FADE_DUR, 0, 1);
  }

  return { text: state.displayText, fadeAlpha };
}

// ─── AUDIO ────────────────────────────────────────────────────────────────────
function unlockAudio() {
  if (!audioUnlocked) {
    audio.volume = MIN_SOUND;
    audio.play().catch(() => {});
    audioUnlocked = true;
  }
}
document.addEventListener('click', unlockAudio, { once: true });
document.addEventListener('keydown', unlockAudio, { once: true });
document.addEventListener('scroll', unlockAudio, { once: true, capture: true });
wrapper.addEventListener('scroll', unlockAudio, { once: true });

function setVolume(symDistance) {
  if (!audioUnlocked) return;
  // symDistance: pixels between inner edges of symbols (0 = touching)
  const proximity = clamp(1 - symDistance / (WORLD_W - SYM_W * 2), 0, 1);
  const vol = clamp(Math.pow(proximity, 1.2) * (1 - MIN_SOUND) + MIN_SOUND, MIN_SOUND, 1.0);
  audio.volume = vol;
}

// ─── MAIN LOOP ────────────────────────────────────────────────────────────────
let lastT = null;

function frame(ts) {
  if (!lastT) { lastT = ts; startTime = ts; }
  const dt = Math.min((ts - lastT) / 1000, 0.1);
  lastT = ts;
  elapsed = (ts - startTime) / 1000;

  updateClock(elapsed);

  // ── PHASE 0: Shrinking ─────────────────────────────────────────────────────
  if (phase === 0) {
    const t = clamp(elapsed / SHRINK_DUR, 0, 1);
    margin = t * MAX_MARGIN;

    symLX = margin;
    symRX = WORLD_W - margin - SYM_W;

    if (margin >= MAX_MARGIN) {
      phase = 1;
      phaseTimer = 0;
      passStartLX = symLX;
      passStartRX = symRX;
    }
  }

  // ── PHASE 1: Pass-through ─────────────────────────────────────────────────
  else if (phase === 1) {
    phaseTimer += dt;
    const t = clamp(phaseTimer / passDuration, 0, 1);
    const center = WORLD_W / 2;
    // left symbol moves right past center, right symbol moves left past center
    symLX = passStartLX + (passTargetOffset) * t;
    symRX = passStartRX - (passTargetOffset) * t;
    if (phaseTimer >= passDuration) {
      phase = 2;
      phaseTimer = 0;
    }
  }

  // ── PHASE 2: Imperfect circle pause ────────────────────────────────────────
  else if (phase === 2) {
    phaseTimer += dt;
    // symbols stay overlapping; slight vertical offset via CSS already
    symLEl.style.marginTop = '3px';
    if (phaseTimer >= 1.5) {
      phase = 3;
      phaseTimer = 0;
      crackCenterX = (symLX + SYM_W + symRX) / 2;
    }
  }

  // ── PHASE 3: Crack expansion ───────────────────────────────────────────────
  else if (phase === 3) {
    phaseTimer += dt;
    const t = clamp(phaseTimer / 2.0, 0, 1);
    const cw = crackMaxW * t;
    const ch = crackMaxH * t;
    crackEl.style.width  = cw + 'px';
    crackEl.style.height = ch + 'px';
    crackEl.style.left   = crackCenterX + 'px';
    crackEl.style.top    = (PLANE_H / 2 + 80/2) + 'px'; // positioned on plane
    if (phaseTimer >= 2.0) {
      phase = 4;
      phaseTimer = 0;
    }
  }

  // ── PHASE 4: Expansion (separation renewed) ────────────────────────────────
  else if (phase === 4) {
    phaseTimer += dt;
    // Plane slowly expands back, symbols separate
    const expandRate = 1.5; // px per second per side
    margin = Math.max(0, margin - expandRate * dt);
    symLX = margin;
    symRX = WORLD_W - margin - SYM_W;

    // Fade crack
    const crackOpacity = clamp(1 - phaseTimer / 3.0, 0, 1);
    crackEl.style.opacity = crackOpacity;

    // Fade audio
    if (audioUnlocked) {
      const vol = clamp(audio.volume - 0.003, 0, 1);
      audio.volume = vol;
    }

    symLEl.style.marginTop = '';
  }

  // ── UPDATE PLANE VISUAL ────────────────────────────────────────────────────
  const planeLeft  = margin;
  const planeWidth = WORLD_W - 2 * margin;
  plane.style.left  = planeLeft + 'px';
  plane.style.width = Math.max(0, planeWidth) + 'px';

  // ── UPDATE SYMBOLS ─────────────────────────────────────────────────────────
  symLEl.style.left = symLX + 'px';
  symREl.style.left = symRX + 'px';

  // ── SYMBOL DISTANCE FOR AUDIO ──────────────────────────────────────────────
  const symDistance = Math.max(0, symRX - (symLX + SYM_W));
  if (phase === 0 || phase === 1) setVolume(symDistance);

  // ── UPDATE TEXT SECTIONS ───────────────────────────────────────────────────
  sectionEls.forEach(state => {
    const { sec, el } = state;
    const planeRelX = sec.worldX - margin;

    // Is this text within the visible plane?
    if (planeRelX < 0 || planeRelX > planeWidth) {
      el.style.opacity = 0;
      return;
    }

    el.style.left = planeRelX + 'px';

    const baseOpacity = textOpacity(sec.worldX, sec.side, margin);
    const { text, fadeAlpha } = updateTypewriter(state, dt);
    el.textContent = text;
    el.style.opacity = baseOpacity * fadeAlpha;
  });

  // ── UPDATE MARKS ───────────────────────────────────────────────────────────
  markEls.forEach(el => {
    const wx = parseFloat(el.dataset.worldX);
    const relX = wx - margin;
    if (relX < 0 || relX > planeWidth) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
      el.style.left = relX + 'px';
    }
  });

  requestAnimationFrame(frame);
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
// Start scrolled to left
wrapper.scrollLeft = 0;

// Attempt audio (may be blocked until gesture)
audio.volume = MIN_SOUND;
audio.play().then(() => { audioUnlocked = true; }).catch(() => {});

requestAnimationFrame(frame);
</script>
</body>
</html>
